aid: pandas
name: pandas
description: >-
  pandas is a fast, powerful, flexible, and easy to use open source data
  analysis and manipulation tool, built on top of the Python programming
  language. It is a Python library that provides DataFrame and Series data
  structures and analysis tools; pandas itself does not expose an HTTP API,
  but is widely used to build data APIs alongside frameworks like FastAPI
  and Flask.
